; =============================================
; 增强版 nodnsleak.ini（支持更多协议 + 彻底防 DNS 泄露）
; 新增功能：
;   1. 支持 Clash Meta 全协议（VLESS Reality / Hysteria2 / TUIC / Trojan / VMess / SS 等全部识别）
;   2. 新增 6 个协议专用分组（需开启「插入节点类型」）
;   3. 国家分组 regex 进一步优化
;   4. 规则最严格，DNS 零泄露
; =============================================

[custom]
; ==================== 防 DNS 泄露规则集（最严格版） ====================
ruleset=🚀 节点选择,[]DOMAIN-SUFFIX,xn--ngstr-lra8j.com
ruleset=🚀 节点选择,[]DOMAIN-SUFFIX,services.googleapis.cn
ruleset=🚀 节点选择,https://raw.githubusercontent.com/ACL4SSR/ACL4SSR/master/Clash/Ruleset/GoogleCNProxyIP.list
ruleset=DIRECT,https://raw.githubusercontent.com/ACL4SSR/ACL4SSR/master/Clash/LocalAreaNetwork.list
ruleset=DIRECT,https://raw.githubusercontent.com/ACL4SSR/ACL4SSR/master/Clash/UnBan.list
ruleset=DIRECT,https://raw.githubusercontent.com/ACL4SSR/ACL4SSR/master/Clash/ChinaDomain.list
ruleset=DIRECT,https://raw.githubusercontent.com/ACL4SSR/ACL4SSR/master/Clash/ChinaMedia.list
ruleset=REJECT,https://raw.githubusercontent.com/ACL4SSR/ACL4SSR/master/Clash/BanAD.list
ruleset=REJECT,https://raw.githubusercontent.com/ACL4SSR/ACL4SSR/master/Clash/BanProgramAD.list
ruleset=DIRECT,https://raw.githubusercontent.com/ACL4SSR/ACL4SSR/master/Clash/ChinaCompanyIp.list
ruleset=DIRECT,https://raw.githubusercontent.com/ACL4SSR/ACL4SSR/master/Clash/ChinaIp.list
ruleset=DIRECT,[]GEOIP,CN,no-resolve
ruleset=🚀 节点选择,[]FINAL

; ==================== 代理群组部分 ====================
custom_proxy_group=🚀 节点选择`select`[]♻️ 自动选择`[]DIRECT`[]🌍 全部节点`[]🇭🇰 香港节点`[]🇹🇼 台湾节点`[]🇸🇬 新加坡节点`[]🇯🇵 日本节点`[]🇺🇸 美国节点`[]🇰🇷 韩国节点`[]🇨🇦 加拿大节点`[]🇬🇧 英国节点`[]🇹🇷 土耳其节点`[]🇮🇳 印度节点`[]🇳🇱 荷兰节点`[]🇫🇷 法国节点`[]🇩🇪 德国节点`[]🇻🇳 越南节点`[]Hy2 节点`[]VLESS Reality`[]TUIC 节点`[]Trojan 节点`[]VMess 节点`[]SS 节点`.*

custom_proxy_group=♻️ 自动选择`url-test`.*`http://www.gstatic.com/generate_204`300,,50

; ==================== 国家/地区节点分组（已增强 regex） ====================
custom_proxy_group=🇭🇰 香港节点`select`.*(Hong Kong|香港|HK|HongKong|HKT).*
custom_proxy_group=🇹🇼 台湾节点`select`.*(Taiwan|台湾|TW|Taipei|TPE).*
custom_proxy_group=🇸🇬 新加坡节点`select`.*(Singapore|新加坡|SG|SGP).*
custom_proxy_group=🇯🇵 日本节点`select`.*(Japan|日本|JP|Tokyo|Osaka|JPN).*
custom_proxy_group=🇺🇸 美国节点`select`.*(United States|美国|US|USA|America|U.S.|US-A|US01).*
custom_proxy_group=🇰🇷 韩国节点`select`.*(South Korea|韩国|Korea|KR|Seoul|KOR).*
custom_proxy_group=🇨🇦 加拿大节点`select`.*(Canada|加拿大|CA|Toronto).*
custom_proxy_group=🇬🇧 英国节点`select`.*(Great Britain|United Kingdom|英国|UK|GB|London).*
custom_proxy_group=🇹🇷 土耳其节点`select`.*(Turkey|土耳其|TR).*
custom_proxy_group=🇮🇳 印度节点`select`.*(India|印度|IN).*
custom_proxy_group=🇳🇱 荷兰节点`select`.*(Netherlands|荷兰|NL|Dutch).*
custom_proxy_group=🇫🇷 法国节点`select`.*(France|法国|FR|Paris).*
custom_proxy_group=🇩🇪 德国节点`select`.*(Germany|德国|DE|Berlin).*
custom_proxy_group=🇻🇳 越南节点`select`.*(Vietnam|越南|VN).*

; ==================== 新增：协议类型独立分组 ====================
custom_proxy_group=Hy2 节点`select`.*(Hysteria2|hy2|HY2|Hysteria).*
custom_proxy_group=VLESS Reality`select`.*(VLESS|vless|Reality|reality-opts).*
custom_proxy_group=TUIC 节点`select`.*(TUIC|tuic|TUICv5).*
custom_proxy_group=Trojan 节点`select`.*(Trojan|trojan).*
custom_proxy_group=VMess 节点`select`.*(VMess|vmess).*
custom_proxy_group=SS 节点`select`.*(SS|Shadowsocks|shadowsocks|ss2022).*

; ==================== 全部节点组 ====================
custom_proxy_group=🌍 全部节点`select`[]DIRECT`[]REJECT`.*

; ==================== Meta 内核必备参数 ====================
enable_rule_generator=true
overwrite_original_rules=true
